<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D2C 업무일지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:#F0F4F8;height:100vh;overflow:hidden;color:#1A202C;-webkit-font-smoothing:antialiased}
input,textarea,select,button{font-family:inherit}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:60px;flex-shrink:0;background:#1A202C;display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px;position:sticky;top:0;height:100vh;z-index:20}
.sb-logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#4F63D2,#6B46C1);display:flex;align-items:center;justify-content:center;margin-bottom:14px;color:#fff;font-size:16px}
.sb-btn{width:40px;height:40px;border-radius:10px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;color:#718096;font-size:18px;cursor:pointer;transition:all .15s}
.sb-btn:hover{background:rgba(255,255,255,.08);color:#E2E8F0}
.sb-btn.active{background:rgba(99,102,241,.25);color:#818CF8}
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #E2E8F0;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.topbar-title{font-size:15px;font-weight:700;color:#1A202C;letter-spacing:-.3px}
.topbar-sub{font-size:11px;color:#A0AEC0;margin-top:1px;font-weight:400}
.body-wrap{display:flex;flex:1;overflow:hidden;height:calc(100vh - 53px)}
.content-area{flex:1;overflow-y:auto;padding:22px 28px;min-width:0}
.content{max-width:900px;width:100%}

/* 중간 위젯 패널 */
.mid-panel{width:260px;flex-shrink:0;background:#F7FAFC;border-left:1px solid #E2E8F0;border-right:1px solid #E2E8F0;overflow-y:auto;padding:16px}
.mid-panel-title{font-size:11px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.focus-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-radius:8px;margin-bottom:4px;background:#fff;border:1px solid #EDF2F7;cursor:pointer;transition:all .1s}
.focus-item:hover{border-color:#BEE3F8;background:#EBF8FF}
.focus-check{width:15px;height:15px;border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;border:1.5px solid #CBD5E0;cursor:pointer;transition:all .15s}
.focus-check.done{background:#4F63D2;border:none}

/* 사이드패널 */
.side-panel{width:290px;flex-shrink:0;background:#fff;border-left:1px solid #E2E8F0;overflow-y:auto;padding:16px}
.side-panel-title{font-size:11px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:5px}
.color-section{margin-bottom:16px}
.color-header{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding:5px 8px;border-radius:8px}
.color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.color-label{font-size:12px;font-weight:600;color:#2D3748}
.color-count{font-size:10px;color:#A0AEC0;margin-left:auto}
.side-task{display:flex;align-items:flex-start;gap:7px;padding:5px 8px;border-radius:7px;margin-bottom:2px;cursor:pointer;transition:background .1s}
.side-task:hover{background:#F7FAFC}
.side-check{width:14px;height:14px;border-radius:3px;flex-shrink:0;margin-top:1px;border:1.5px solid #CBD5E0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.side-check.done{border:none}
.side-task-text{font-size:12px;color:#2D3748;line-height:1.5;flex:1}
.side-task-text.done{color:#A0AEC0;text-decoration:line-through}
.side-date{font-size:10px;color:#CBD5E0;margin-top:1px}

/* 미니 캘린더 */
.mini-cal{margin-bottom:16px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav{width:22px;height:22px;border:none;background:transparent;cursor:pointer;color:#A0AEC0;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px}
.cal-nav:hover{background:#F7FAFC;color:#4A5568}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{text-align:center;padding:4px 2px;font-size:11px;border-radius:5px;cursor:pointer;transition:all .1s;color:#4A5568}
.cal-cell:hover{background:#EBF4FF;color:#2B6CB0}
.cal-cell.today{background:#4F63D2;color:#fff;font-weight:700}
.cal-cell.has-task{position:relative}
.cal-cell.has-task::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:#68D391}
.cal-cell.other-month{color:#CBD5E0}
.cal-day-label{text-align:center;font-size:9px;color:#A0AEC0;font-weight:600;padding:2px 0}

/* 카드 */
.card{background:#fff;border:1px solid #E2E8F0;border-radius:14px;padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card.today{border-color:#C3DAFE;box-shadow:0 0 0 3px rgba(99,102,241,.08)}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:600;white-space:nowrap;letter-spacing:.2px;cursor:pointer;position:relative}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.stat-card{background:#fff;border-radius:12px;padding:14px 16px;border:1px solid #E2E8F0;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.btn-primary{padding:8px 16px;border-radius:8px;background:#4F63D2;color:#fff;border:none;font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;cursor:pointer;transition:all .15s}
.btn-primary:hover{background:#4254C0}
.btn-primary:disabled{background:#CBD5E0;cursor:not-allowed}
.btn-outline{padding:5px 12px;border-radius:8px;background:#fff;color:#4A5568;border:1px solid #E2E8F0;font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px;cursor:pointer;transition:all .15s}
.btn-outline:hover{background:#F7FAFC;border-color:#CBD5E0}
.btn-share{padding:8px 16px;border-radius:8px;background:#6B46C1;color:#fff;border:none;font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;display:flex;align-items:center;gap:7px;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.toast.ok{background:#276749;color:#fff}
.toast.err{background:#C53030;color:#fff}
.kpt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:10px}
.kpt-card{border-radius:10px;padding:12px 14px}
.kpt-card.keep{background:#F0FFF4;border:1px solid #C6F6D5}
.kpt-card.problem{background:#FFF5F5;border:1px solid #FED7D7}
.kpt-card.try{background:#FFFFF0;border:1px solid #FEFCBF}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:26px;width:100%;max-width:490px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:#A0AEC0;font-size:13px;gap:8px}
textarea{width:100%;border:1px solid #E2E8F0;border-radius:10px;padding:10px 13px;font-size:13px;line-height:1.7;resize:vertical;background:#F7FAFC;color:#2D3748;outline:none;font-family:'Noto Sans KR',sans-serif}
textarea:focus{border-color:#BEE3F8;background:#fff;box-shadow:0 0 0 3px rgba(99,162,241,.1)}
input[type=date],input[type=password],input[type=text]{border:1px solid #E2E8F0;border-radius:8px;padding:7px 12px;font-size:13px;color:#2D3748;outline:none;background:#fff;font-family:'Noto Sans KR',sans-serif}
input:focus{border-color:#BEE3F8;box-shadow:0 0 0 3px rgba(99,162,241,.1)}
.task-wrap{border-radius:8px;margin-bottom:3px;padding:5px 8px;transition:background .1s}
.task-wrap:hover{background:#F7FAFC}

/* 태그 드롭다운 */
.tag-dropdown{position:absolute;top:100%;left:0;z-index:50;background:#fff;border:1px solid #E2E8F0;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:6px;min-width:160px;display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.tag-option{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .1s}
.tag-option:hover{opacity:.8;transform:scale(1.05)}

.day-pill{flex:1;border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;border:1px solid transparent}
.day-pill.today-pill{background:#EBF4FF;border-color:#BEE3F8}
.day-pill:not(.today-pill){background:#F7FAFC}
.day-pill:hover{background:#EBF8FF}

.ROW_red{background:#FFF5F5}
.ROW_yellow{background:#FFFFF0}
.ROW_green{background:#F0FFF4}
.ROW_blue{background:#EBF8FF}
.ROW_purple{background:#FAF5FF}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React

const SB_URL = 'https://zxfytktctzgkssxbqbyj.supabase.co'
const SB_KEY = 'sb_publishable_815pQE6fA0sXIBS3RcmDAA_6FptB6NS'

const DEFAULT_TAGS = ['물류','마케팅','광고','CS','리서치','시딩','브로드캐스팅','KPI','캠페인','가격정책','브랜드관리','기타']

const TAG_COLORS = {
  '물류':      {bg:'#DBEAFE',c:'#1E40AF'},
  '마케팅':    {bg:'#EDE9FE',c:'#5B21B6'},
  '광고':      {bg:'#FCE7F3',c:'#9D174D'},
  'CS':        {bg:'#FEF3C7',c:'#78350F'},
  '리서치':    {bg:'#D1FAE5',c:'#064E3B'},
  '시딩':      {bg:'#F3E8FF',c:'#6B21A8'},
  '브로드캐스팅':{bg:'#F5F3FF',c:'#5B21B6'},
  'KPI':       {bg:'#E2E8F0',c:'#2D3748'},
  '캠페인':    {bg:'#FEF9C3',c:'#713F12'},
  '가격정책':  {bg:'#E0F2FE',c:'#075985'},
  '브랜드관리':{bg:'#FCE7F3',c:'#831843'},
  '기타':      {bg:'#F1F5F9',c:'#475569'},
}

const ROW_COLORS = {red:'#FFF5F5',yellow:'#FFFFF0',green:'#F0FFF4',blue:'#EBF8FF',purple:'#FAF5FF'}
const DOT_COLORS = {red:'#FC8181',yellow:'#F6E05E',green:'#68D391',blue:'#63B3ED',purple:'#B794F4'}
const COLOR_LABELS = {red:'빨강',yellow:'노랑',green:'초록',blue:'파랑',purple:'보라'}

const DAYS_KO = ['일','월','화','수','목','금','토']

function toDate(d=new Date()){
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0')
  return `${y}-${m}-${day}`
}
function weekStart(d=new Date()){
  const dt=new Date(d),day=dt.getDay()
  dt.setDate(dt.getDate()-day+(day===0?-6:1))
  return toDate(dt)
}
function weekDays(ws){
  return Array.from({length:5},(_,i)=>{
    const d=new Date(ws+'T00:00:00')
    d.setDate(d.getDate()+i)
    return toDate(d)
  })
}
function fmtDate(s){const d=new Date(s);return `${d.getMonth()+1}/${d.getDate()} (${DAYS_KO[d.getDay()]})`}
function fmtWeek(ws){const d=new Date(ws);return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${Math.ceil(d.getDate()/7)}주차`}

async function dbLoad(weekKey){
  const r=await fetch(`${SB_URL}/rest/v1/worklog?week_key=eq.${weekKey}&select=*`,{headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}})
  const data=await r.json()
  return Array.isArray(data)?data:[]
}
async function dbSave(row){
  const r=await fetch(`${SB_URL}/rest/v1/worklog?on_conflict=week_key,date_key`,{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify(row)
  })
  return r.ok
}
async function dbRemove(weekKey,dateKey){
  await fetch(`${SB_URL}/rest/v1/worklog?week_key=eq.${weekKey}&date_key=eq.${dateKey}`,{
    method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}
  })
}

function Tag({t, onChangeTag, allTags, readOnly}){
  const [open,setOpen]=useState(false)
  const ref=useRef()
  const c=TAG_COLORS[t]||{bg:'#F1F5F9',c:'#475569'}

  useEffect(()=>{
    if(!open)return
    const handler=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)}
    document.addEventListener('mousedown',handler)
    return()=>document.removeEventListener('mousedown',handler)
  },[open])

  if(readOnly) return <span className="tag" style={{background:c.bg,color:c.c}}>{t}</span>

  return(
    <span ref={ref} style={{position:'relative',display:'inline-block'}}>
      <span className="tag" style={{background:c.bg,color:c.c}} onClick={e=>{e.stopPropagation();setOpen(!open)}} title="클릭해서 분류 변경">
        {t} <i className="ti ti-chevron-down" style={{fontSize:8,marginLeft:2}}/>
      </span>
      {open&&(
        <div className="tag-dropdown" onClick={e=>e.stopPropagation()}>
          {allTags.map(tag=>{
            const tc=TAG_COLORS[tag]||{bg:'#F1F5F9',c:'#475569'}
            return(
              <button key={tag} className="tag-option" style={{background:tc.bg,color:tc.c}}
                onClick={()=>{onChangeTag(tag);setOpen(false)}}>
                {tag}
              </button>
            )
          })}
        </div>
      )}
    </span>
  )
}

function TaskItem({task, onToggle, onUpdate, onDelete, readOnly, allTags, onDragStart, onDragOver, onDrop, isDragging}){
  const [editingText,setEditingText]=useState(false)
  const [editingMemo,setEditingMemo]=useState(false)
  const [textVal,setTextVal]=useState(task.text)
  const [memoVal,setMemoVal]=useState('')

  const saveText=()=>{
    setEditingText(false)
    const t=textVal.trim()
    if(t&&t!==task.text)onUpdate({...task,text:t})
    else setTextVal(task.text)
  }
  const saveMemo=()=>{
    setEditingMemo(false)
    if(memoVal!==(task.memo||''))onUpdate({...task,memo:memoVal})
  }

  const rowBg=ROW_COLORS[task.color]||'transparent'

  return(
    <div className="task-wrap"
      draggable={!readOnly}
      onDragStart={onDragStart}
      onDragOver={e=>{e.preventDefault();onDragOver&&onDragOver(e)}}
      onDrop={onDrop}
      style={{background:rowBg,opacity:isDragging?0.4:1,cursor:readOnly?'default':'grab'}}>
      <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
        {!readOnly&&(
          <div style={{color:'#CBD5E0',fontSize:12,cursor:'grab',paddingTop:3,flexShrink:0}} title="드래그해서 순서 변경">
            <i className="ti ti-grip-vertical"/>
          </div>
        )}
        <div onClick={onToggle} style={{width:17,height:17,borderRadius:4,flexShrink:0,marginTop:2,border:task.done?'none':'1.5px solid #CBD5E0',background:task.done?'#4F63D2':'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all .15s'}}>
          {task.done&&<i className="ti ti-check" style={{fontSize:10,color:'#fff'}}/>}
        </div>
        {editingText?(
          <input autoFocus value={textVal} onChange={e=>setTextVal(e.target.value)}
            onBlur={saveText}
            onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();saveText()}if(e.key==='Escape'){setTextVal(task.text);setEditingText(false)}}}
            style={{flex:1,fontSize:13.5,fontWeight:task.bold?700:500,border:'2px solid #4F63D2',borderRadius:6,padding:'2px 9px',outline:'none',background:'#EBF4FF'}}
          />
        ):(
          <span style={{flex:1,fontSize:13.5,lineHeight:1.65,fontWeight:task.bold?700:500,color:task.done?'#A0AEC0':'#1A202C',textDecoration:task.done?'line-through':'none',letterSpacing:'-.2px',wordBreak:'break-all'}}>
            {task.text}
          </span>
        )}
        <Tag t={task.tag} allTags={allTags} readOnly={readOnly} onChangeTag={(newTag)=>onUpdate({...task,tag:newTag})}/>
        {!readOnly&&!editingText&&(
          <div style={{display:'flex',gap:2,flexShrink:0,alignItems:'center'}}>
            <button onClick={()=>onUpdate({...task,bold:!task.bold})} title="굵게"
              style={{border:'none',background:task.bold?'#E9D8FD':'transparent',color:task.bold?'#6B46C1':'#CBD5E0',cursor:'pointer',padding:'2px 5px',borderRadius:4,fontSize:11,fontWeight:700,lineHeight:1}}>B</button>
            {Object.entries(DOT_COLORS).map(([k,clr])=>(
              <div key={k} onClick={()=>onUpdate({...task,color:task.color===k?null:k})}
                style={{width:11,height:11,borderRadius:'50%',background:clr,cursor:'pointer',border:task.color===k?'2px solid #2D3748':'1.5px solid transparent',flexShrink:0,transition:'all .15s'}}
                title={COLOR_LABELS[k]}/>
            ))}
            <button onClick={()=>{setTextVal(task.text);setEditingText(true)}} title="수정"
              style={{border:'none',background:'transparent',color:'#CBD5E0',cursor:'pointer',padding:'1px 3px',fontSize:13}}>
              <i className="ti ti-pencil"/>
            </button>
            <button onClick={e=>{e.stopPropagation();onDelete()}} title="삭제"
              style={{border:'none',background:'transparent',color:'#FC8181',cursor:'pointer',padding:'1px 3px',fontSize:13}}>
              <i className="ti ti-trash"/>
            </button>
          </div>
        )}
      </div>
      <div style={{marginLeft:readOnly?24:44,marginTop:4}}>
        {editingMemo?(
          <textarea autoFocus value={memoVal} onChange={e=>setMemoVal(e.target.value)}
            onBlur={saveMemo}
            onKeyDown={e=>{if(e.key==='Escape'){setMemoVal(task.memo||'');setEditingMemo(false)}}}
            placeholder="비고 입력 (Ctrl+Enter 저장)"
            rows={3}
            style={{width:'100%',fontSize:12,border:'1px solid #BEE3F8',borderRadius:7,padding:'6px 10px',outline:'none',background:'#EBF8FF',color:'#2D3748',resize:'vertical',lineHeight:1.6}}
          />
        ):task.memo?(
          <div onClick={()=>{if(!readOnly){setMemoVal(task.memo||'');setEditingMemo(true)}}}
            style={{fontSize:12,color:'#4A5568',cursor:readOnly?'default':'text',background:'rgba(0,0,0,.03)',borderRadius:6,padding:'5px 9px',lineHeight:1.65,borderLeft:'2px solid #CBD5E0',whiteSpace:'pre-wrap',wordBreak:'break-all'}}>
            <i className="ti ti-notes" style={{fontSize:11,color:'#A0AEC0',marginRight:5}}/>{task.memo}
          </div>
        ):(!readOnly&&(
          <span onClick={()=>{setMemoVal('');setEditingMemo(true)}}
            style={{fontSize:11,color:'#CBD5E0',cursor:'pointer',display:'flex',alignItems:'center',gap:3}}>
            <i className="ti ti-plus" style={{fontSize:10}}/> 비고 추가
          </span>
        ))}
      </div>
    </div>
  )
}

function ManualInput({onSave, allTags, onAddTag}){
  const [text,setText]=useState('')
  const [tag,setTag]=useState('기타')
  const [newTag,setNewTag]=useState('')
  const [showAddTag,setShowAddTag]=useState(false)

  function addTag(){
    if(!newTag.trim()||allTags.includes(newTag.trim()))return
    onAddTag(newTag.trim());setTag(newTag.trim());setNewTag('');setShowAddTag(false)
  }
  function save(){
    if(!text.trim())return
    onSave({text:text.trim(),tag,done:false});setText('')
  }

  return(
    <div className="card">
      <div style={{fontSize:11,fontWeight:700,color:'#718096',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>업무 직접 추가</div>
      <input type="text" value={text} onChange={e=>setText(e.target.value)}
        onKeyDown={e=>{if(e.key==='Enter')save()}}
        placeholder="업무 내용 입력 후 Enter 또는 추가 버튼"
        style={{width:'100%',marginBottom:10}}
      />
      <div style={{marginBottom:10}}>

/* 미니 캘린더 */
function MiniCalendar({taskDates, onDateClick}){
  const [calDate,setCalDate]=useState(new Date())
  const today=toDate()

  const year=calDate.getFullYear(),month=calDate.getMonth()
  const firstDay=new Date(year,month,1).getDay()
  const daysInMonth=new Date(year,month+1,0).getDate()
  const adjustedFirst=firstDay===0?6:firstDay-1

  const cells=[]
  for(let i=0;i<adjustedFirst;i++) cells.push(null)
  for(let d=1;d<=daysInMonth;d++) cells.push(d)

  return(
    <div className="mini-cal">
      <div className="cal-header">
        <button className="cal-nav" onClick={()=>setCalDate(new Date(year,month-1,1))}>
          <i className="ti ti-chevron-left" style={{fontSize:11}}/>
        </button>
        <span style={{fontSize:12,fontWeight:700,color:'#2D3748'}}>{year}.{String(month+1).padStart(2,'0')}</span>
        <button className="cal-nav" onClick={()=>setCalDate(new Date(year,month+1,1))}>
          <i className="ti ti-chevron-right" style={{fontSize:11}}/>
        </button>
      </div>
      <div className="cal-grid">
        {['월','화','수','목','금','토','일'].map(d=>(
          <div key={d} className="cal-day-label">{d}</div>
        ))}
        {cells.map((d,i)=>{
          if(!d) return <div key={i}/>
          const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
          const isToday=dateStr===today
          const hasTask=taskDates.includes(dateStr)
          return(
            <div key={i} className={`cal-cell${isToday?' today':''}${hasTask?' has-task':''}`}
              onClick={()=>onDateClick(dateStr)}>
              {d}
            </div>
          )
        })}
      </div>
    </div>
  )
}

/* 빠른 메모 */
function QuickMemo(){

/* 색상 라벨 인라인 수정 */
function ColorLabelEdit({color, label, onSave}){
  const [editing,setEditing]=useState(false)
  const [val,setVal]=useState(label)
  const dotClr=DOT_COLORS[color]

  if(editing) return(
    <input autoFocus value={val}
      onChange={e=>setVal(e.target.value)}
      onBlur={()=>{setEditing(false);if(val.trim()&&val.trim()!==label)onSave(val.trim());else setVal(label)}}
      onKeyDown={e=>{
        if(e.key==='Enter'){setEditing(false);if(val.trim())onSave(val.trim())}
        if(e.key==='Escape'){setVal(label);setEditing(false)}
      }}
      style={{fontSize:12,fontWeight:600,color:'#2D3748',border:'1px solid #BEE3F8',borderRadius:5,padding:'1px 6px',outline:'none',background:'#EBF8FF',width:90}}
    />
  )
  return(
    <span className="color-label" onClick={()=>setEditing(true)}
      title="클릭해서 이름 수정"
      style={{cursor:'pointer',borderBottom:'1px dashed #CBD5E0'}}>
      {label}
    </span>
  )
}

/* 색상별 체크리스트 사이드패널 */
function SidePanel({rows, onToggleTask, onDateClick}){
  const [colorLabels,setColorLabels]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('d2c:colorLabels')||'null')||{...COLOR_LABELS}}
    catch(e){return{...COLOR_LABELS}}
  })

  function saveColorLabel(color,newLabel){
    const updated={...colorLabels,[color]:newLabel}
    setColorLabels(updated)
    localStorage.setItem('d2c:colorLabels',JSON.stringify(updated))
  }

  const allColorTasks={}
  Object.keys(DOT_COLORS).forEach(color=>{allColorTasks[color]=[]})

  rows.forEach(row=>{
    if(!row.tasks||row.date_key.startsWith('__'))return
    row.tasks.forEach((task,idx)=>{
      if(task.color&&allColorTasks[task.color]){
        allColorTasks[task.color].push({...task,dateKey:row.date_key,idx})
      }
    })
  })

  const taskDates=rows.filter(r=>r.tasks?.length&&!r.date_key.startsWith('__')).map(r=>r.date_key)
  const hasAnyColor=Object.values(allColorTasks).some(arr=>arr.length>0)

  return(
    <div className="side-panel">
      <div className="side-panel-title"><i className="ti ti-calendar" style={{fontSize:13}}/>캘린더</div>
      <MiniCalendar taskDates={taskDates} onDateClick={onDateClick}/>

      <div style={{borderTop:'1px solid #EDF2F7',paddingTop:14,marginTop:2}}>
        <div className="side-panel-title"><i className="ti ti-color-swatch" style={{fontSize:13}}/>색상별 할일</div>
        {!hasAnyColor?(
          <div style={{fontSize:11.5,color:'#CBD5E0',textAlign:'center',padding:'16px 0',fontStyle:'italic'}}>
            업무에 색상을 지정하면<br/>여기에 표시됩니다
          </div>
        ):(
          Object.entries(DOT_COLORS).map(([color,dotClr])=>{
            const tasks=allColorTasks[color]
            if(!tasks.length)return null
            const done=tasks.filter(t=>t.done).length
            return(
              <div key={color} className="color-section">
                <div className="color-header" style={{background:ROW_COLORS[color]}}>
                  <div className="color-dot" style={{background:dotClr}}/>
                  <ColorLabelEdit color={color} label={colorLabels[color]} onSave={(l)=>saveColorLabel(color,l)}/>
                  <span className="color-count">{done}/{tasks.length}</span>
                </div>
                {tasks.map((task,i)=>(
                  <div key={i} className="side-task" onClick={()=>onDateClick(task.dateKey)}>
                    <div className={`side-check${task.done?' done':''}`}
                      style={{background:task.done?dotClr:'transparent',borderColor:task.done?dotClr:'#CBD5E0'}}
                      onClick={e=>{e.stopPropagation();onToggleTask(task.dateKey,task.idx)}}>
                      {task.done&&<i className="ti ti-check" style={{fontSize:8,color:'#fff'}}/>}
                    </div>
                    <div style={{flex:1}}>
                      <div className={`side-task-text${task.done?' done':''}`}>{task.text}</div>
                      <div className="side-date">{fmtDate(task.dateKey)}</div>
                    </div>
                  </div>
                ))}
              </div>
            )
          })
        )}
      </div>

      {/* 이번 주 진행률 */}
      <div style={{borderTop:'1px solid #EDF2F7',paddingTop:14,marginTop:2}}>
        <div className="side-panel-title"><i className="ti ti-chart-bar" style={{fontSize:13}}/>이번 주 진행률</div>
        {(()=>{
          const allT=rows.filter(r=>r.tasks?.length&&!r.date_key.startsWith('__')).flatMap(r=>r.tasks)
          const total=allT.length,done=allT.filter(t=>t.done).length
          const pct=total?Math.round(done/total*100):0
          const barColor=pct>=80?'#68D391':pct>=50?'#F6AD55':'#FC8181'
          return(
            <div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                <span style={{fontSize:11,color:'#718096'}}>완료 {done} / 전체 {total}</span>
                <span style={{fontSize:12,fontWeight:700,color:barColor}}>{pct}%</span>
              </div>
              <div style={{background:'#EDF2F7',borderRadius:99,height:7,overflow:'hidden'}}>
                <div style={{width:`${pct}%`,height:'100%',background:barColor,borderRadius:99,transition:'width .4s'}}/>
              </div>
              <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
                {['월','화','수','목','금'].map((day,i)=>{
                  const wdays=weekDays(rows[0]?.week_key||weekStart())
                  const row=rows.find(r=>r.date_key===wdays[i])
                  const d=(row?.tasks||[]).filter(t=>t.done).length
                  const tot=(row?.tasks||[]).length
                  return(
                    <div key={day} style={{flex:1,textAlign:'center',background:'#F7FAFC',borderRadius:8,padding:'6px 4px'}}>
                      <div style={{fontSize:9,color:'#A0AEC0',fontWeight:600}}>{day}</div>
                      <div style={{fontSize:13,fontWeight:700,color:tot>0&&d===tot?'#38A169':'#1A202C',marginTop:2}}>{tot>0?`${d}/${tot}`:'—'}</div>
                    </div>
                  )
                })}
              </div>
            </div>
          )
        })()}
      </div>

      {/* 태그별 분포 */}
      {(()=>{
        const allT=rows.filter(r=>r.tasks?.length&&!r.date_key.startsWith('__')).flatMap(r=>r.tasks)
        if(!allT.length)return null
        const tagCount={}
        allT.forEach(t=>{tagCount[t.tag]=(tagCount[t.tag]||0)+1})
        const sorted=Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0,5)
        const max=sorted[0]?.[1]||1
        return(
          <div style={{borderTop:'1px solid #EDF2F7',paddingTop:14,marginTop:14}}>
            <div className="side-panel-title"><i className="ti ti-tag" style={{fontSize:13}}/>태그별 업무</div>
            {sorted.map(([tag,cnt])=>{
              const c=TAG_COLORS[tag]||{bg:'#F1F5F9',c:'#475569'}
              return(
                <div key={tag} style={{marginBottom:6}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                    <span style={{fontSize:11,fontWeight:600,color:c.c}}>{tag}</span>
                    <span style={{fontSize:10,color:'#A0AEC0'}}>{cnt}건</span>
                  </div>
                  <div style={{background:'#EDF2F7',borderRadius:99,height:5}}>
                    <div style={{width:`${cnt/max*100}%`,height:'100%',background:c.c,borderRadius:99,opacity:.7}}/>
                  </div>
                </div>
              )
            })}
          </div>
        )
      })()}

      {/* 빠른 메모 */}
      <QuickMemo/>
    </div>
  )
}

function App(){

  const isReadOnly=params.get('readonly')==='1'
  const roWeek=params.get('week')||weekStart()

  const [view,setView]=useState('weekly')
  const [rows,setRows]=useState([])
  const [curWeek,setCurWeek]=useState(isReadOnly?roWeek:weekStart())
  const [selDate,setSelDate]=useState(toDate())
  const [raw,setRaw]=useState('')
  const [busy,setBusy]=useState(false)
  const [kptBusy,setKptBusy]=useState(false)
  const [loading,setLoading]=useState(true)
  const [pendingScrollDate,setPendingScrollDate]=useState(null)
  const [dragState,setDragState]=useState(null)
  const [dragOver,setDragOver]=useState(null)
  const [toast,setToast]=useState(null)
  const [apiKey,setApiKey]=useState('')
  const [apiInput,setApiInput]=useState('')
  const [showApi,setShowApi]=useState(false)
  const [showShare,setShowShare]=useState(false)
  const [notionWebhook,setNotionWebhook]=useState(()=>{try{return localStorage.getItem('d2c:notion')||''}catch(e){return ''}})
  const [notionInput,setNotionInput]=useState('')
  const [customTags,setCustomTags]=useState(()=>{try{return JSON.parse(localStorage.getItem('d2c:tags')||'[]')}catch(e){return[]}})
  const contentRef=useRef()

  const allTags=[...DEFAULT_TAGS,...customTags]

  const load=useCallback(async(wk)=>{
    setLoading(true)
    try{const data=await dbLoad(wk);setRows(data)}
    catch(e){setRows([])}
    finally{setLoading(false)}
  },[])

  useEffect(()=>{
    load(curWeek)
    try{const k=localStorage.getItem('d2c:key');if(k)setApiKey(k)}catch(e){}
  },[curWeek])

  function notify(msg,type='ok'){setToast({msg,type});setTimeout(()=>setToast(null),3000)}

  // 주가 바뀐 뒤 로딩 완료되면 스크롤
  useEffect(()=>{
    if(!loading&&pendingScrollDate){
      setTimeout(()=>{
        const el=document.getElementById('day-'+pendingScrollDate)
        if(el&&contentRef.current){
          contentRef.current.scrollTo({top:el.offsetTop-contentRef.current.offsetTop-16,behavior:'smooth'})
        }
        setPendingScrollDate(null)
      },100)
    }
  },[loading,pendingScrollDate])

  function scrollToDate(dateKey){
    setView('weekly')
    setTimeout(()=>{
      const el=document.getElementById('day-'+dateKey)
      if(el&&contentRef.current){
        contentRef.current.scrollTo({top:el.offsetTop-contentRef.current.offsetTop-16,behavior:'smooth'})
      }
    },100)
  }

  function addCustomTag(tag){
    const updated=[...customTags,tag]
    setCustomTags(updated)
    localStorage.setItem('d2c:tags',JSON.stringify(updated))
  }

  const getRow=(dk)=>rows.find(r=>r.date_key===dk)
  const kptRow=rows.find(r=>r.date_key==='__kpt')
  const safeRows=Array.isArray(rows)?rows:[]

  function updateLocal(dateKey,tasks,notes){
    setRows(prev=>Array.isArray(prev)?prev.map(r=>r.date_key===dateKey?{...r,tasks,notes:notes||r.notes||''}:r):prev)
  }

  async function upsert(dateKey,tasks,notes,reload=false){
    updateLocal(dateKey,tasks,notes)
    const ok=await dbSave({week_key:curWeek,date_key:dateKey,tasks,notes,updated_at:new Date().toISOString()})
    if(!ok)notify('저장 실패','err')
    else if(reload)await load(curWeek)
  }

  async function toggleTask(dateKey,idx){
    const row=getRow(dateKey);if(!row)return
    const tasks=row.tasks.map((t,i)=>i===idx?{...t,done:!t.done}:t)
    await upsert(dateKey,tasks,row.notes||'')
  }

  async function updateTask(dateKey,idx,updated){
    const row=getRow(dateKey);if(!row)return
    const tasks=row.tasks.map((t,i)=>i===idx?{...t,...updated}:t)
    await upsert(dateKey,tasks,row.notes||'')
  }

  async function deleteTask(dateKey,idx){
    const row=getRow(dateKey);if(!row)return
    const tasks=row.tasks.filter((_,i)=>i!==idx)
    await upsert(dateKey,tasks,row.notes||'')
    notify('삭제됐습니다.')
  }

  async function addTask(dateKey,task){
    const row=getRow(dateKey)
    const tasks=row?[...row.tasks,task]:[task]
    await upsert(dateKey,tasks,row?.notes||'',!row)
    if(!row)await load(curWeek)
    sendToNotion(dateKey,tasks)
    // 추가 후 해당 날짜로 스크롤
    scrollToDate(dateKey)
    notify('추가됐습니다!')
  }

  async function deleteDay(dateKey){
    await dbRemove(curWeek,dateKey)
    await load(curWeek)
    notify('삭제됐습니다.')
  }

  async function callClaude(prompt){
    if(!apiKey){setShowApi(true);throw new Error('no key')}
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    })
    const d=await r.json()
    if(d.error)throw new Error(d.error.message)
    const txt=d.content?.map(c=>c.text||'').join('')||''
    return JSON.parse(txt.replace(/```json|```/g,'').trim())
  }

  async function sendToNotion(dateKey,tasks){
    if(!notionWebhook)return
    try{
      await fetch(notionWebhook,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          date:dateKey,week:fmtWeek(curWeek),
          tasks:tasks.map(t=>({text:t.text,tag:t.tag,done:t.done,memo:t.memo||''})),
          timestamp:new Date().toLocaleString('ko-KR'),source:'D2C 업무일지'
        })
      })
    }catch(e){console.log('Notion webhook error',e)}
  }

  async function processInput(){
    if(!raw.trim())return;setBusy(true)
    try{
      const parsed=await callClaude(`다음 업무 내용을 JSON으로 구조화. JSON만 출력:\n\n${raw}\n\n형식:\n{"tasks":[{"text":"업무내용(간결)","tag":"${allTags.join('|')}","done":true}],"notes":"상세메모(없으면 빈문자열)"}`)
      await upsert(selDate,parsed.tasks||[],parsed.notes||'')
      setRaw('')
      scrollToDate(selDate)
      notify('저장 완료!')
    }catch(e){if(e.message!=='no key')notify('처리 실패. API 키 확인해주세요.','err')}
    finally{setBusy(false)}
  }

  async function genKpt(){
    const all=safeRows.filter(r=>r.tasks?.length).flatMap(r=>r.tasks)
    if(!all.length){notify('업무 데이터가 없습니다','err');return}
    setKptBusy(true)
    try{
      const kpt=await callClaude(`이번 주 업무를 보고 KPT 회고를 JSON으로. JSON만 출력:\n\n${all.map(t=>`[${t.done?'완료':'미완'}] ${t.text}`).join('\n')}\n\n형식:\n{"keep":["..."],"problem":["..."],"try":["..."]}`)
      await dbSave({week_key:curWeek,date_key:'__kpt',tasks:[],notes:'',kpt,updated_at:new Date().toISOString()})
      await load(curWeek);notify('KPT 생성 완료!')
    }catch(e){if(e.message!=='no key')notify('KPT 생성 실패','err')}
    finally{setKptBusy(false)}
  }

  const shareUrl=`${window.location.origin}${window.location.pathname}?readonly=1&week=${curWeek}`
  const days=weekDays(curWeek),today=toDate()
  const allTasks=safeRows.filter(r=>r.tasks?.length&&!r.date_key.startsWith('__')).flatMap(r=>r.tasks)

  const NAV=isReadOnly?[
    {id:'weekly',icon:'ti-calendar',lbl:'주간'},
  ]:[
    {id:'dashboard',icon:'ti-home',lbl:'홈'},
    {id:'input',icon:'ti-edit',lbl:'입력'},
    {id:'weekly',icon:'ti-calendar',lbl:'주간'},
  ]

  const showSidePanel=view==='weekly'||view==='dashboard'

  return(
    <div className="app">
      <div className="sidebar">
        <div className="sb-logo"><i className="ti ti-notebook"/></div>
        {NAV.map(n=>(
          <button key={n.id} className={`sb-btn${view===n.id?' active':''}`} onClick={()=>setView(n.id)} title={n.lbl}>
            <i className={`ti ${n.icon}`}/>
          </button>
        ))}
        <div style={{flex:1}}/>
        {!isReadOnly&&(
          <button className="sb-btn" title="설정" onClick={()=>setShowApi(true)}>
            <i className="ti ti-settings" style={{fontSize:16}}/>
          </button>
        )}
      </div>

      <div className="main-wrap">
        <div className="topbar">
          <div>
            <div className="topbar-title">
              {isReadOnly?'업무일지 보기':NAV.find(n=>n.id===view)?.lbl}
              {isReadOnly&&<span style={{marginLeft:8,fontSize:11,padding:'2px 8px',borderRadius:10,background:'#EBF8FF',color:'#2B6CB0',fontWeight:500}}>읽기 전용</span>}
            </div>
            <div className="topbar-sub">D2C팀 · {fmtWeek(curWeek)}</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {!isReadOnly&&(view==='weekly'||view==='dashboard')&&(
              <button className="btn-share" onClick={()=>setShowShare(true)}>
                <i className="ti ti-share" style={{fontSize:13}}/>대표님 공유
              </button>
            )}
            {view==='input'&&!isReadOnly&&(
              <button className="btn-primary" onClick={processInput} disabled={busy||!raw.trim()}>
                <i className="ti ti-sparkles" style={{fontSize:13}}/>{busy?'처리 중...':'Claude 자동 정리'}
              </button>
            )}
          </div>
        </div>

        <div className="body-wrap">
          <div className="content-area" ref={contentRef}>
            <div className="content">
              {loading&&<div className="loading"><i className="ti ti-loader"/>불러오는 중...</div>}

              {!loading&&view==='dashboard'&&!isReadOnly&&(
                <div>
                  <div className="stat-grid">
                    {[
                      {lbl:'이번 주 완료',val:allTasks.filter(t=>t.done).length},
                      {lbl:'전체 업무',val:allTasks.length},
                      {lbl:'기록된 날',val:safeRows.filter(r=>!r.date_key.startsWith('__')&&r.tasks?.length>0).length},
                    ].map((s,i)=>(
                      <div key={i} className="stat-card">
                        <div style={{fontSize:11,color:'#718096',marginBottom:4,fontWeight:500}}>{s.lbl}</div>
                        <div style={{fontSize:24,fontWeight:700,color:'#1A202C'}}>{s.val}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    {[
                      {lbl:'오늘 업무 입력',sub:'직접 또는 Claude 자동 정리',icon:'ti-plus',c:'#4F63D2',act:()=>setView('input')},
                      {lbl:'주간 일지 보기',sub:'이번 주 전체 현황',icon:'ti-calendar-week',c:'#38A169',act:()=>setView('weekly')},
                    ].map((a,i)=>(
                      <div key={i} className="card" style={{cursor:'pointer',display:'flex',alignItems:'center',gap:12}} onClick={a.act}>
                        <div style={{width:36,height:36,borderRadius:10,background:a.c+'18',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                          <i className={`ti ${a.icon}`} style={{fontSize:18,color:a.c}}/>
                        </div>
                        <div>
                          <div style={{fontSize:13,fontWeight:600,color:'#1A202C'}}>{a.lbl}</div>
                          <div style={{fontSize:11,color:'#A0AEC0',marginTop:2}}>{a.sub}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {!loading&&view==='input'&&!isReadOnly&&(
                <div>
                  <div className="card">
                    <div style={{fontSize:11,fontWeight:700,color:'#718096',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>날짜 선택</div>
                    <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{width:170}}/>
                  </div>
                  <ManualInput allTags={allTags} onAddTag={addCustomTag} onSave={(task)=>addTask(selDate,task)}/>
                  {apiKey&&(
                    <div className="card">
                      <div style={{fontSize:11,fontWeight:700,color:'#718096',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>
                        Claude 자동 정리
                        <span style={{fontSize:10,color:'#A0AEC0',fontWeight:400,textTransform:'none',marginLeft:6}}>날것 그대로 → 자동 분류</span>
                      </div>
                      <textarea value={raw} onChange={e=>setRaw(e.target.value)} rows={6} placeholder={"오늘 업무를 자유롭게 적어주세요.\n\n예시:\n1. FBS 패킹 완료\n2. CS 처리\n3. 광고 분석"}/>
                      <button className="btn-primary" onClick={processInput} disabled={busy||!raw.trim()} style={{marginTop:10}}>
                        <i className="ti ti-sparkles" style={{fontSize:13}}/>{busy?'처리 중...':'Claude에게 정리 요청'}
                      </button>
                    </div>
                  )}
                </div>
              )}

              {!loading&&view==='weekly'&&(
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
                    <button className="btn-outline" style={{width:32,height:32,padding:0,justifyContent:'center'}}
                      onClick={()=>{const d=new Date(curWeek);d.setDate(d.getDate()-7);setCurWeek(weekStart(d))}}>
                      <i className="ti ti-chevron-left" style={{fontSize:13}}/>
                    </button>
                    <span style={{flex:1,textAlign:'center',fontSize:14,fontWeight:700,color:'#1A202C'}}>{fmtWeek(curWeek)}</span>
                    <button className="btn-outline" style={{width:32,height:32,padding:0,justifyContent:'center'}}
                      onClick={()=>{const d=new Date(curWeek);d.setDate(d.getDate()+7);setCurWeek(weekStart(d))}}>
                      <i className="ti ti-chevron-right" style={{fontSize:13}}/>
                    </button>
                  </div>

                  {days.map(d=>{
                    const row=getRow(d),isT=d===today
                    const done=(row?.tasks||[]).filter(t=>t.done).length,total=(row?.tasks||[]).length
                    return(
                      <div key={d} id={'day-'+d} className={`card${isT?' today':''}`}
                        style={isT?{borderColor:'#4F63D2',boxShadow:'0 0 0 3px rgba(79,99,210,.12)',background:'#FAFBFF'}:{}}>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:row?12:0,paddingBottom:row?12:0,borderBottom:row?`1px solid ${isT?'#C3DAFE':'#EDF2F7'}`:'none'}}>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <span style={{fontSize:isT?16:13,fontWeight:700,color:isT?'#3B4FBF':'#1A202C',letterSpacing:isT?'-.3px':'-.1px'}}>{fmtDate(d)}</span>
                            {isT&&<span style={{fontSize:11,padding:'3px 10px',borderRadius:10,background:'#4F63D2',color:'#fff',fontWeight:700,letterSpacing:'.3px'}}>TODAY</span>}
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:6}}>
                            {total>0&&<span style={{fontSize:isT?13:11,color:isT?'#4F63D2':'#A0AEC0',fontWeight:isT?700:500}}>{done}/{total}</span>}
                            {!isReadOnly&&(
                              <button className="btn-outline" style={{padding:'3px 9px',fontSize:11}} onClick={()=>{setSelDate(d);setView('input')}}>
                                <i className="ti ti-plus" style={{fontSize:11}}/>{row?'추가':'입력'}
                              </button>
                            )}
                            {!isReadOnly&&row&&(
                              <button onClick={()=>deleteDay(d)} style={{width:24,height:24,border:'none',background:'transparent',cursor:'pointer',color:'#CBD5E0',borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center'}}>
                                <i className="ti ti-trash" style={{fontSize:12}}/>
                              </button>
                            )}
                          </div>
                        </div>
                        {row?(
                          <div style={{padding:'0 2px'}}>
                            {row.tasks?.map((t,i)=>(
                              <TaskItem key={i} task={t} readOnly={isReadOnly} allTags={allTags}
                                isDragging={dragState?.dateKey===d&&dragState?.idx===i}
                                onToggle={()=>!isReadOnly&&toggleTask(d,i)}
                                onUpdate={(updated)=>updateTask(d,i,updated)}
                                onDelete={()=>deleteTask(d,i)}
                                onDragStart={()=>setDragState({dateKey:d,idx:i})}
                                onDragOver={()=>setDragOver({dateKey:d,idx:i})}
                                onDrop={()=>{
                                  if(!dragState||!dragOver)return
                                  if(dragState.dateKey===dragOver.dateKey){
                                    const r=getRow(dragState.dateKey)
                                    if(!r)return
                                    const tasks=[...r.tasks]
                                    const [moved]=tasks.splice(dragState.idx,1)
                                    tasks.splice(dragOver.idx,0,moved)
                                    upsert(dragState.dateKey,tasks,r.notes||'')
                                  }
                                  setDragState(null);setDragOver(null)
                                }}
                              />
                            ))}
                            {row.notes&&(
                              <div style={{margin:'8px 6px 2px',padding:'8px 11px',background:'#F7FAFC',borderRadius:8,fontSize:12,color:'#4A5568',lineHeight:1.7,borderLeft:'3px solid #E2E8F0',whiteSpace:'pre-wrap'}}>
                                {row.notes}
                              </div>
                            )}
                          </div>
                        ):(
                          <div style={{textAlign:'center',padding:isT?'20px':'14px',fontSize:isT?13:12,color:'#CBD5E0',fontStyle:'italic'}}>
                            {isT?'오늘 업무를 입력해주세요 ✍️':'업무 기록 없음'}
                          </div>
                        )}
                      </div>
                    )
                  })}

                  <div className="card">
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                      <span style={{fontSize:13,fontWeight:700,color:'#1A202C'}}>KPT 주간 회고</span>
                      {!isReadOnly&&(
                        <button className="btn-outline" style={{background:'#EBF4FF',borderColor:'#BEE3F8',color:'#2B6CB0'}} onClick={genKpt} disabled={kptBusy}>
                          <i className="ti ti-sparkles" style={{fontSize:11}}/>{kptBusy?'생성 중...':'Claude로 자동 생성'}
                        </button>
                      )}
                    </div>
                    {kptRow?.kpt?(
                      <div className="kpt-grid">
                        {[{k:'keep',lbl:'KEEP',cls:'keep',c:'#276749'},{k:'problem',lbl:'PROBLEM',cls:'problem',c:'#9B2C2C'},{k:'try',lbl:'TRY',cls:'try',c:'#744210'}].map(({k,lbl,cls,c})=>(
                          <div key={k} className={`kpt-card ${cls}`}>
                            <div style={{fontSize:11,fontWeight:700,color:c,marginBottom:8,letterSpacing:'.5px'}}>{lbl}</div>
                            {(kptRow.kpt[k]||[]).map((item,i)=>(
                              <div key={i} style={{fontSize:12,color:'#2D3748',lineHeight:1.6,paddingLeft:10,position:'relative',marginBottom:4}}>
                                <span style={{position:'absolute',left:0,color:c,fontWeight:700}}>·</span>{item}
                              </div>
                            ))}
                          </div>
                        ))}
                      </div>
                    ):(
                      <div style={{textAlign:'center',padding:'16px',fontSize:12,color:'#CBD5E0'}}>업무 입력 후 버튼을 눌러 KPT 자동 생성</div>
                    )}
                  </div>
                </div>
              )}
            </div>
          </div>

          {showSidePanel&&(
            <MidPanel
              rows={safeRows}
              onToggleTask={toggleTask}
              onDateClick={(dateKey)=>{
                const dWeek=weekStart(new Date(dateKey))
                if(dWeek!==curWeek){
                  setCurWeek(dWeek)
                  setPendingScrollDate(dateKey)
                  setView('weekly')
                }else{
                  scrollToDate(dateKey)
                }
              }}
            />
          )}

          {showSidePanel&&(
            <SidePanel
              rows={safeRows}
              onToggleTask={toggleTask}
              onDateClick={(dateKey)=>{
                const dWeek=weekStart(new Date(dateKey))
                if(dWeek!==curWeek){
                  setCurWeek(dWeek)
                  setPendingScrollDate(dateKey)
                  setView('weekly')
                }else{
                  scrollToDate(dateKey)
                }
              }}
            />
          )}
        </div>
      </div>

      {showApi&&(
        <div className="modal-bg" onClick={()=>setShowApi(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:15,fontWeight:700,color:'#1A202C',marginBottom:6}}>
              <i className="ti ti-key" style={{marginRight:7,color:'#4F63D2'}}/>API 키 설정
            </div>
            <div style={{fontSize:12,color:'#718096',lineHeight:1.7,marginBottom:14}}>
              Claude 자동 정리 기능에 필요합니다.<br/>
              <a href="https://console.anthropic.com" target="_blank" style={{color:'#4F63D2'}}>console.anthropic.com</a>에서 발급
            </div>
            <input type="password" value={apiInput} onChange={e=>setApiInput(e.target.value)} placeholder="sk-ant-api03-..." style={{width:'100%',marginBottom:16}}/>
            <div style={{borderTop:'1px solid #EDF2F7',paddingTop:14,marginBottom:8}}>
              <div style={{fontSize:13,fontWeight:700,color:'#1A202C',marginBottom:4}}>📋 노션 연동 (선택)</div>
              <div style={{fontSize:11.5,color:'#718096',lineHeight:1.7,marginBottom:10}}>
                Make.com Webhook URL 입력
              </div>
              <input type="text" value={notionInput||notionWebhook} onChange={e=>setNotionInput(e.target.value)}
                placeholder="https://hook.us2.make.com/..." style={{width:'100%',marginBottom:8,fontSize:12}}/>
              {notionWebhook&&<div style={{fontSize:11,color:'#38A169',marginBottom:4}}>✅ 노션 연동 설정됨</div>}
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn-outline" onClick={()=>setShowApi(false)}>취소</button>
              <button className="btn-primary" onClick={()=>{
                if(apiInput.trim()){localStorage.setItem('d2c:key',apiInput);setApiKey(apiInput)}
                if(notionInput.trim()){localStorage.setItem('d2c:notion',notionInput);setNotionWebhook(notionInput)}
                setShowApi(false);notify('저장됐습니다.')
              }}>저장</button>
            </div>
          </div>
        </div>
      )}

      {showShare&&(
        <div className="modal-bg" onClick={()=>setShowShare(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:15,fontWeight:700,color:'#1A202C',marginBottom:6}}>
              <i className="ti ti-share" style={{marginRight:7,color:'#6B46C1'}}/>대표님 공유 링크
            </div>
            <div style={{fontSize:12,color:'#718096',lineHeight:1.7,marginBottom:12}}>
              아래 링크를 전달하시면 이번 주 업무 보고서를 보실 수 있습니다.<br/>
              <strong>읽기 전용</strong> · 로그인 불필요
            </div>
            <div style={{background:'#F7FAFC',border:'1px solid #E2E8F0',borderRadius:8,padding:'10px 13px',fontSize:11.5,color:'#4A5568',wordBreak:'break-all',lineHeight:1.6,marginBottom:14}}>
              {shareUrl}
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn-outline" onClick={()=>setShowShare(false)}>닫기</button>
              <button className="btn-share" onClick={()=>navigator.clipboard.writeText(shareUrl).then(()=>notify('링크 복사됐습니다!'))}>
                <i className="ti ti-copy" style={{fontSize:13}}/>링크 복사
              </button>
            </div>
          </div>
        </div>
      )}

      {toast&&(
        <div className={`toast ${toast.type}`}>
          <i className={`ti ${toast.type==='ok'?'ti-circle-check':'ti-alert-circle'}`}/>{toast.msg}
        </div>
      )}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
